<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Чертёж — 3D фигура</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Courier New', monospace;
    background: #f5f0e1;
    color: #1a1a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }
  h1 {
    font-size: 22px;
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 2px;
    border-bottom: 2px solid #1a1a2e;
    padding-bottom: 5px;
  }
  .controls {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 8px 16px;
    background: #fff;
    border: 2px solid #1a1a2e;
    padding: 16px;
    margin-bottom: 16px;
    width: 100%;
    max-width: 920px;
  }
  .controls h2 {
    grid-column: 1 / -1;
    font-size: 14px;
    border-bottom: 1px solid #999;
    padding-bottom: 4px;
    margin-bottom: 4px;
  }
  .control {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
  }
  .control label {
    min-width: 110px;
    font-weight: bold;
  }
  .control input[type=range] { flex: 1; min-width: 80px; }
  .control .val {
    min-width: 36px;
    text-align: right;
    font-weight: bold;
  }
  .drawing-frame {
    border: 3px solid #1a1a2e;
    background: #fff;
    padding: 10px;
    position: relative;
    max-width: 960px;
    width: 100%;
  }
  .drawing-frame::before {
    content: '';
    position: absolute;
    inset: 4px;
    border: 1px solid #1a1a2e;
    pointer-events: none;
  }
  svg { display: block; width: 100%; height: auto; }
  .title-block {
    border-top: 2px solid #1a1a2e;
    margin-top: 8px;
    padding-top: 6px;
    display: grid;
    grid-template-columns: 1fr 1fr 2fr;
    font-size: 12px;
  }
  .title-block span { padding: 2px 4px; }
  .title-block span:not(:last-child) { border-right: 1px solid #1a1a2e; }
</style>
</head>
<body>

<h1>Чертёж детали — 3D</h1>

<div class="controls">
  <h2>Горизонтальные размеры</h2>
  <div class="control">
    <label>A = 10 (верх лев.):</label>
    <input type="range" id="pA" min="2" max="25" step="0.1" value="10">
    <span class="val" id="vA">10</span>
  </div>
  <div class="control">
    <label>B = 2 (верх сред.):</label>
    <input type="range" id="pB" min="0.5" max="10" step="0.1" value="2">
    <span class="val" id="vB">2</span>
  </div>
  <div class="control">
    <label>C = 18 (верх прав.):</label>
    <input type="range" id="pC" min="2" max="30" step="0.1" value="18">
    <span class="val" id="vC">18</span>
  </div>

  <h2>Вертикальные размеры</h2>
  <div class="control">
    <label>H1 = 0.9 (лев.):</label>
    <input type="range" id="pH1" min="0.2" max="3" step="0.1" value="0.9">
    <span class="val" id="vH1">0.9</span>
  </div>
  <div class="control">
    <label>H2 = 1.3 (сред. лев.):</label>
    <input type="range" id="pH2" min="0.5" max="5" step="0.1" value="1.3">
    <span class="val" id="vH2">1.3</span>
  </div>
  <div class="control">
    <label>H3 = 1.8 (сред. прав.):</label>
    <input type="range" id="pH3" min="0.5" max="5" step="0.1" value="1.8">
    <span class="val" id="vH3">1.8</span>
  </div>
  <div class="control">
    <label>H4 = 2.4 (прав.):</label>
    <input type="range" id="pH4" min="1" max="8" step="0.1" value="2.4">
    <span class="val" id="vH4">2.4</span>
  </div>
  <div class="control">
    <label>D = 1.5 (уступ прав.):</label>
    <input type="range" id="pD" min="0" max="5" step="0.1" value="1.5">
    <span class="val" id="vD">1.5</span>
  </div>

  <h2>3D Глубина</h2>
  <div class="control">
    <label>Глубина:</label>
    <input type="range" id="pDepth" min="0" max="10" step="0.1" value="3">
    <span class="val" id="vDepth">3</span>
  </div>
  <div class="control">
    <label>Угол обзора (°):</label>
    <input type="range" id="pAngle" min="15" max="60" step="1" value="35">
    <span class="val" id="vAngle">35</span>
  </div>
</div>

<div class="drawing-frame">
  <svg id="svg" viewBox="0 0 900 500"></svg>
  <div class="title-block">
    <span>Материал: —</span>
    <span>Масштаб: условный</span>
    <span>Чертёж детали — изометрический 3D вид</span>
  </div>
</div>

<script>
const ids = ['pA','pB','pC','pH1','pH2','pH3','pH4','pD','pDepth','pAngle'];
const valIds = ['vA','vB','vC','vH1','vH2','vH3','vH4','vD','vDepth','vAngle'];
const inputs = ids.map(id => document.getElementById(id));
const vals   = valIds.map(id => document.getElementById(id));
const svg    = document.getElementById('svg');

/* ========== Drawing ========== */
function draw() {
  const A     = +inputs[0].value;   // top-left horizontal segment
  const B     = +inputs[1].value;   // top-middle horizontal segment
  const C     = +inputs[2].value;   // top-right horizontal segment
  const H1    = +inputs[3].value;   // left-side height
  const H2    = +inputs[4].value;   // height at position A (step line)
  const H3    = +inputs[5].value;   // height at position A+B (step line)
  const H4    = +inputs[6].value;   // right-side full height
  const D     = +inputs[7].value;   // right-side top ledge (vertical step at top-right)
  const depth = +inputs[8].value;   // 3D extrusion depth
  const angle = +inputs[9].value;   // 3D viewing angle

  inputs.forEach((inp, i) => vals[i].textContent = inp.value);

  /* Scale to fit ~620px width */
  const totalW = A + B + C;
  const maxH   = Math.max(H1, H2, H3, H4);
  const s      = Math.min(620 / totalW, 350 / maxH);

  /* 3D offset (isometric-ish projection) */
  const rad  = angle * Math.PI / 180;
  const dx3d = depth * s * Math.cos(rad);
  const dy3d = depth * s * Math.sin(rad);

  /* Margins */
  const mx = 100, my = 80 + dy3d;

  /* -------- Front face vertices (clockwise from top-left) --------
   *
   *  P0 ──────────── P1 ──── P2 ──────────────────── P3
   *  │                                                │  } D (small ledge)
   *  │                                                P4
   *  │                                                │
   *  │                │      │                        │
   *  P7               P6     P5                       │
   *   ╲              │       │                        │
   *    ╲ (diagonal) │        │                       P8 (= bottom-right)
   *
   *  Shape: top is flat. Left side is short (H1).
   *  Bottom goes diagonally from left (H1) down to A position (H2),
   *  then vertical drop to H3 at A+B, then diagonal/flat to bottom-right (H4).
   *  Right side has optional ledge D at the top.
   */

  const ox = mx, oy = my;

  const frontFace = [
    { x: ox,                    y: oy },                     // P0  top-left
    { x: ox + A * s,            y: oy },                     // P1  top at A
    { x: ox + (A + B) * s,      y: oy },                     // P2  top at A+B
    { x: ox + totalW * s,       y: oy },                     // P3  top-right
    { x: ox + totalW * s,       y: oy + D * s },             // P4  right ledge step
    { x: ox + totalW * s,       y: oy + H4 * s },            // P5  bottom-right
    { x: ox + (A + B) * s,      y: oy + H3 * s },            // P6  bottom at A+B
    { x: ox + A * s,            y: oy + H2 * s },            // P7  bottom at A
    { x: ox,                    y: oy + H1 * s },            // P8  bottom-left
  ];

  const ff = frontFace;

  /* Back face = front shifted along the depth axis */
  const backFace = ff.map(p => ({ x: p.x + dx3d, y: p.y - dy3d }));

  /* -------- SVG size -------- */
  const svgW = totalW * s + mx * 2 + dx3d + 60;
  const svgH = maxH * s + my + 80;
  svg.setAttribute('viewBox', `0 0 ${svgW} ${svgH}`);

  let out = '';

  /* -------- Grid (blueprint style) -------- */
  const gs = 20;
  for (let x = 0; x < svgW; x += gs)
    out += `<line x1="${x}" y1="0" x2="${x}" y2="${svgH}" stroke="#c8dbe8" stroke-width="0.3"/>`;
  for (let y = 0; y < svgH; y += gs)
    out += `<line x1="0" y1="${y}" x2="${svgW}" y2="${y}" stroke="#c8dbe8" stroke-width="0.3"/>`;

  /* -------- Helpers -------- */
  const pts = arr => arr.map(p => `${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');

  function edgeLine(a, b, cls) {
    return `<line x1="${a.x}" y1="${a.y}" x2="${b.x}" y2="${b.y}" class="${cls}"/>`;
  }

  /* -------- 3D surfaces (draw BEFORE front face) -------- */
  if (depth > 0) {
    /* Back face — dashed, behind everything */
    out += `<polygon points="${pts(backFace)}" fill="rgba(200,215,230,0.12)"
              stroke="#1a1a2e" stroke-width="1" stroke-dasharray="6,3" fill-rule="evenodd"/>`;

    /* Depth edges — visible ones solid, hidden ones dashed */
    ff.forEach((fp, i) => {
      const bp = backFace[i];
      // Heuristic: top-row (0-3) and right-side (3-5) are visible; bottom and left are hidden
      const visible = (i <= 3) || (i === 4) || (i === 5);
      const cls = visible ? 'depth-vis' : 'depth-hid';
      out += edgeLine(fp, bp, cls);
    });

    /* Top surface fill */
    const topSurf = [ff[0], ff[3], backFace[3], backFace[0]];
    out += `<polygon points="${pts(topSurf)}" fill="rgba(210,225,240,0.35)"
              stroke="#1a1a2e" stroke-width="1"/>`;

    /* Right surface fill (P3→P4→P5 → back) */
    const rightSurf = [ff[3], ff[4], ff[5], backFace[5], backFace[4], backFace[3]];
    out += `<polygon points="${pts(rightSurf)}" fill="rgba(180,200,220,0.35)"
              stroke="#1a1a2e" stroke-width="1"/>`;
  }

  /* -------- Front face (solid, on top) -------- */
  out += `<polygon points="${pts(ff)}" fill="rgba(255,255,255,0.9)"
            stroke="#1a1a2e" stroke-width="2.2" stroke-linejoin="miter"/>`;

  /* Internal construction lines on front face (dashed) */
  // Vertical line at A position
  out += `<line x1="${ff[1].x}" y1="${ff[1].y}" x2="${ff[7].x}" y2="${ff[7].y}"
            stroke="#1a1a2e" stroke-width="0.6" stroke-dasharray="4,3"/>`;
  // Vertical line at A+B position
  out += `<line x1="${ff[2].x}" y1="${ff[2].y}" x2="${ff[6].x}" y2="${ff[6].y}"
            stroke="#1a1a2e" stroke-width="0.6" stroke-dasharray="4,3"/>`;
  // Horizontal line at D ledge level
  if (D > 0) {
    out += `<line x1="${ff[4].x - 15}" y1="${ff[4].y}" x2="${ff[4].x}" y2="${ff[4].y}"
              stroke="#1a1a2e" stroke-width="0.5" stroke-dasharray="3,2"/>`;
  }

  /* ======== DIMENSION LINES (red, GOST-style) ======== */
  const dimClr = '#c62828';
  const aLen = 5, aW = 2.5;

  function arrow(x, y, dir) {
    let p;
    if (dir === 'r') p = `${x},${y} ${x-aLen},${y-aW} ${x-aLen},${y+aW}`;
    if (dir === 'l') p = `${x},${y} ${x+aLen},${y-aW} ${x+aLen},${y+aW}`;
    if (dir === 'd') p = `${x},${y} ${x-aW},${y-aLen} ${x+aW},${y-aLen}`;
    if (dir === 'u') p = `${x},${y} ${x-aW},${y+aLen} ${x+aW},${y+aLen}`;
    return `<polygon points="${p}" fill="${dimClr}"/>`;
  }

  function dimH(x1, x2, y, label, extTop, extBot) {
    // Horizontal dimension between x1 and x2 at height y
    let r = '';
    r += `<line x1="${x1}" y1="${y}" x2="${x2}" y2="${y}" stroke="${dimClr}" stroke-width="0.7"/>`;
    if (extTop !== undefined) {
      r += `<line x1="${x1}" y1="${extTop}" x2="${x1}" y2="${y - 3}" stroke="${dimClr}" stroke-width="0.5"/>`;
      r += `<line x1="${x2}" y1="${extBot !== undefined ? extBot : extTop}" x2="${x2}" y2="${y - 3}" stroke="${dimClr}" stroke-width="0.5"/>`;
    }
    r += arrow(x1, y, 'l');
    r += arrow(x2, y, 'r');
    r += `<text x="${(x1+x2)/2}" y="${y - 5}" text-anchor="middle" fill="${dimClr}"
            font-family="Courier New" font-size="12" font-style="italic">${label}</text>`;
    return r;
  }

  function dimV(x, y1, y2, label, side) {
    // Vertical dimension between y1 and y2 at x position
    const off = (side === 'l') ? -15 : 15;
    let r = '';
    r += `<line x1="${x}" y1="${y1}" x2="${x}" y2="${y2}" stroke="${dimClr}" stroke-width="0.7"/>`;
    // Extension lines
    const eDir = (side === 'l') ? -1 : 1;
    r += `<line x1="${x - eDir * 20}" y1="${y1}" x2="${x + eDir * 3}" y2="${y1}" stroke="${dimClr}" stroke-width="0.5"/>`;
    r += `<line x1="${x - eDir * 20}" y1="${y2}" x2="${x + eDir * 3}" y2="${y2}" stroke="${dimClr}" stroke-width="0.5"/>`;
    r += arrow(x, y1, 'u');
    r += arrow(x, y2, 'd');
    r += `<text x="${x + off}" y="${(y1+y2)/2 + 4}" text-anchor="middle" fill="${dimClr}"
            font-family="Courier New" font-size="12" font-style="italic">${label}</text>`;
    return r;
  }

  /* Horizontal dims above the shape */
  const dy = 30 + dy3d;
  const dimYtop = ff[0].y - dy;

  out += dimH(ff[0].x, ff[1].x, dimYtop, A, ff[0].y, ff[1].y);
  out += dimH(ff[1].x, ff[2].x, dimYtop - 22, B, dimYtop, dimYtop);
  out += dimH(ff[2].x, ff[3].x, dimYtop, C, ff[2].y, ff[3].y);

  /* Vertical dims */
  // H1 — left side
  out += dimV(ff[0].x - 30, ff[0].y, ff[8].y, H1, 'l');

  // H2 — at position A
  out += dimV(ff[1].x + 12, ff[1].y, ff[7].y, H2, 'r');

  // H3 — at position A+B
  out += dimV(ff[2].x + 12, ff[2].y, ff[6].y, H3, 'r');

  // H4 — right side full height
  out += dimV(ff[3].x + 30 + dx3d, ff[3].y, ff[5].y, H4, 'r');

  // D — right side ledge
  if (D > 0) {
    const dDimX = ff[3].x + 55 + dx3d;
    out += dimV(dDimX, ff[3].y, ff[4].y, D, 'r');
  }

  /* Depth dimension */
  if (depth > 0) {
    const dp0 = ff[0];
    const dp1 = backFace[0];
    const nOff = 18;
    // Offset perpendicular to the depth direction
    const nx = -Math.sin(rad) * nOff;
    const ny = -Math.cos(rad) * nOff;
    out += `<line x1="${dp0.x + nx}" y1="${dp0.y + ny}" x2="${dp1.x + nx}" y2="${dp1.y + ny}"
              stroke="${dimClr}" stroke-width="0.7"/>`;
    out += `<line x1="${dp0.x}" y1="${dp0.y}" x2="${dp0.x + nx * 1.3}" y2="${dp0.y + ny * 1.3}"
              stroke="${dimClr}" stroke-width="0.5"/>`;
    out += `<line x1="${dp1.x}" y1="${dp1.y}" x2="${dp1.x + nx * 1.3}" y2="${dp1.y + ny * 1.3}"
              stroke="${dimClr}" stroke-width="0.5"/>`;
    const mx2 = (dp0.x + dp1.x) / 2 + nx;
    const my2 = (dp0.y + dp1.y) / 2 + ny;
    out += `<text x="${mx2}" y="${my2 - 6}" text-anchor="middle" fill="${dimClr}"
              font-family="Courier New" font-size="12" font-style="italic"
              transform="rotate(${-angle}, ${mx2}, ${my2 - 6})">${depth}</text>`;
  }

  /* Styles injected as defs */
  const defs = `<defs><style>
    .depth-vis { stroke: #1a1a2e; stroke-width: 1; }
    .depth-hid { stroke: #1a1a2e; stroke-width: 0.7; stroke-dasharray: 5,3; }
  </style></defs>`;

  svg.innerHTML = defs + out;
}

/* Event listeners */
inputs.forEach(inp => inp.addEventListener('input', draw));
draw();
</script>
</body>
</html>
